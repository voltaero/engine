syntax = "proto3";
package engine;
service Engine {
  rpc AquireTask(TaskRequest) returns (Task);
  rpc AquireTaskReg(empty) returns (TaskRegistry);
  rpc PublishTask(Task) returns (empty);
  rpc cgrpc(cgrpcmsg) returns (cgrpcmsg);
  rpc CreateTask(Task) returns (Task);
  rpc DeleteTask(TaskSelector) returns (empty);
  rpc GetTasks(TaskPageRequest) returns (TaskPage);
  rpc CheckAuth(empty) returns (empty);
}

// Cluster membership and discovery service, used between backend nodes and a proxy.
service Cluster {
  rpc RegisterNode(NodeRegisterRequest) returns (NodeRegisterResponse);
  rpc Heartbeat(NodeHeartbeat) returns (NodeHeartbeatAck);
  rpc ListNodes(empty) returns (NodeList);
}
message TaskSelector {
  TaskState state = 1;
  string namespace = 2;
  string task = 3;
  string id = 4;
}
message empty {}
enum TaskState {
  QUEUED = 0;
  PROCESSING = 1;
  SOLVED = 2;
}
message TaskPageRequest {
  string namespace = 1;
  string task = 2;
  uint64 page = 3;
  uint32 pageSize = 4;
  TaskState state = 5;
}
message TaskPage {
  string namespace = 1;
  string task = 2;
  uint64 page = 3;
  uint32 pageSize = 4;
  TaskState state = 5;
  repeated Task tasks = 6;
}
message cgrpcmsg {
  string handler_mod_id = 1;
  string handler_id = 2;
  bytes event_payload = 3;
  string token = 4;
}

message TaskRegistry {
  repeated string tasks = 1; // namespace:task
}

message TaskRequest {
  string task_id = 1; // namespace:task
  // bytes payload = 2;
}
message Task {
  string id = 4; // the task unique identifier
  bytes task_payload = 1;
  string task_id = 2; // namespace:task
  bytes payload = 3;
}

message NodeRegisterRequest {
  string node_id = 1;
  string advertise_addr = 2;        // e.g. "http://10.0.0.12:50051"
  repeated string tags = 3;         // e.g. ["gpu", "control"]
  repeated string tasks = 4;        // ["ns:task", ...] from local task registry
}

message NodeRegisterResponse {
  string session_id = 1;
  uint64 heartbeat_interval_seconds = 2; // default 5
  uint64 ttl_seconds = 3;               // default 15
}

message NodeHeartbeat {
  string node_id = 1;
  string session_id = 2;
}

message NodeHeartbeatAck {
  uint64 server_time_unix = 1;
}

message NodeInfo {
  string node_id = 1;
  string advertise_addr = 2;
  repeated string tags = 3;
  repeated string tasks = 4;
  uint64 last_seen_unix = 5;
  bool healthy = 6;
}

message NodeList {
  repeated NodeInfo nodes = 1;
}
